<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; height: 100vh; }
#toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #2d2d2d; border-bottom: 1px solid #3e3e3e; }
#toolbar button { background: #3e3e3e; color: #d4d4d4; border: 1px solid #555; border-radius: 3px; padding: 3px 10px; cursor: pointer; font-size: 11px; }
#toolbar button:hover { background: #505050; }
#toolbar .status { color: #888; font-size: 11px; margin-left: auto; }
#container { display: flex; flex: 1; overflow: hidden; }
#request-list { width: 320px; min-width: 200px; overflow-y: auto; border-right: 1px solid #3e3e3e; }
#request-list .entry { padding: 6px 10px; cursor: pointer; border-bottom: 1px solid #2a2a2a; border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#request-list .entry.status-ok { border-left-color: #6a9955; }
#request-list .entry.status-err { border-left-color: #f44747; }
#request-list .entry:hover { background: #2a2d3e; }
#request-list .entry.selected { background: #264f78; }
#request-list .entry .method { color: #569cd6; font-weight: bold; margin-right: 6px; }
#request-list .entry .resource { color: #9cdcfe; }
#detail { flex: 1; overflow: auto; padding: 12px; }
#detail pre { white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
.detail-header { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #3e3e3e; }
.detail-header .path { color: #d4d4d4; font-size: 13px; font-weight: bold; word-break: break-all; }
.detail-header .status { margin-top: 4px; font-size: 12px; }
.detail-header .status.ok { color: #6a9955; }
.detail-header .status.err { color: #f44747; }
.json-key { color: #9cdcfe; }
.json-string { color: #ce9178; }
.json-number { color: #b5cea8; }
.json-bool { color: #569cd6; }
.json-null { color: #569cd6; }
.headers-section { margin-bottom: 12px; }
.headers-section summary { cursor: pointer; color: #569cd6; font-weight: bold; padding: 4px 0; user-select: none; }
.headers-section summary:hover { color: #7ecbff; }
.headers-section[open] summary { margin-bottom: 6px; }
.headers-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.headers-table th { text-align: left; color: #888; padding: 2px 8px 2px 0; border-bottom: 1px solid #3e3e3e; }
.headers-table td { padding: 2px 8px 2px 0; border-bottom: 1px solid #2a2a2a; }
.headers-table .header-name { color: #9cdcfe; white-space: nowrap; }
.headers-table .header-value { color: #ce9178; word-break: break-all; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="clear-btn">Clear</button>
  <span class="status" id="status">Listening for CBOR responses...</span>
</div>
<div id="container">
  <div id="request-list"></div>
  <div id="detail"><pre id="output">Select a request to view decoded CBOR</pre></div>
</div>
<script src="cbor.js"></script>
<script src="panel.js"></script>
</body>
</html>
