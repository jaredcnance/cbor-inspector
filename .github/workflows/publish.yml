name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags for git describe / changelog range
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Runs the same scripts as local publishing (bump → sign → post-publish),
      # so CI and `npm run publish:firefox` share one implementation. bump is
      # resume-aware and post-publish is idempotent, so a re-run finishes an
      # interrupted release instead of double-bumping.
      - name: Publish
        run: node scripts/publish.js
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
